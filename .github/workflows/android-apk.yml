name: Build Android APK (Monatiza)

# Roda manualmente (botão "Run workflow") ou quando o app mobile mudar.
on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Preserva o código real (lib/ e pubspec) antes de gerar as plataformas
      - name: Backup do código
        run: |
          cp pubspec.yaml ../pubspec.bak
          cp -r lib ../lib.bak

      - name: Gerar plataforma Android
        run: flutter create --org com.monatiza --platforms=android .

      - name: Restaurar código real
        run: |
          cp ../pubspec.bak pubspec.yaml
          rm -rf lib && cp -r ../lib.bak lib

      # IMPORTANTE: o APK release precisa da permissão de Internet no manifesto principal
      - name: Garantir permissão de Internet
        run: |
          MAN="android/app/src/main/AndroidManifest.xml"
          grep -q 'android.permission.INTERNET' "$MAN" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MAN"
          echo "----- AndroidManifest -----"; cat "$MAN"

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: monatiza-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
